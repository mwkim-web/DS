.g-item,.a-item{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:#888;cursor:pointer;border-left:2px solid transparent}
.g-item{padding:5px 12px 5px 20px}
.a-item{padding:5px 12px}
.g-item:hover,.a-item:hover{color:#CCC;background:#1E1E1E}
.g-item.on,.a-item.on{color:#E0E0E0;background:#243050;border-left-color:#4A7ADF}
.g-item .n,.a-item .n{color:#555;font-size:10px}
.v-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.v-head{display:grid;grid-template-columns:minmax(180px,1.2fr) minmax(140px,1fr) minmax(140px,1fr);border-bottom:0.5px solid #2A2A2A}
.vh{padding:8px 12px;font-size:11px;font-weight:500;color:#666;border-right:0.5px solid #242424}

.v-rows{overflow-y:auto;flex:1}

.s-lbl{padding:5px 12px 3px 20px;font-size:10px;color:#555;background:#1A1A1A;border-bottom:0.5px solid #1E1E1E}
.t-row{display:grid;grid-template-columns:minmax(180px,1.2fr) minmax(140px,1fr) minmax(140px,1fr);border-bottom:0.5px solid #242424;min-height:36px}
.t-row:hover{background:#202020}
.tc{padding:5px 12px;display:flex;align-items:center;gap:6px;border-right:0.5px solid #222;min-width:0}
.tc:last-child{border-right:none}
.t-icon{width:16px;height:16px;border-radius:50%;border:0.5px solid #444;flex-shrink:0}
.t-name{font-size:11.5px;color:#C8C8C8;white-space:nowrap}
.pill{display:flex;align-items:center;gap:5px;background:#252525;border:.5px solid #333;border-radius:5px;padding:3px 7px 3px 3px;width:100%}
.sw{width:18px;height:18px;border-radius:3px;flex-shrink:0;position:relative;overflow:hidden}
.sw-c{position:absolute;inset:0;background-image:linear-gradient(45deg,#555 25%,transparent 25%),linear-gradient(-45deg,#555 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#555 75%),linear-gradient(-45deg,transparent 75%,#555 75%);background-size:6px 6px;background-position:0 0,0 3px,3px -3px,-3px 0}
.sw-v{position:absolute;inset:0}
.al{font-size:11px;color:#B8B8B8;font-family:ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

const VSIDEBAR=[
  {k:'primary',groups:['primary']},
  {k:'label',groups:['label']},
  {k:'fill',groups:['fill','fill/transparent']},
  {k:'line',groups:['line']},

function rgba(hex,a){if(!hex.startsWith('#'))return`rgba(0,0,0,${a})`;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function vpill(hex,alpha,alias){const isW=hex.toUpperCase()==='#FFFFFF';return`<div class="pill"><div class="sw"${isW?' style="border:.5px solid #555"':''}>${alpha<1?'<div class="sw-c"></div>':''}<div class="sw-v" style="background:${rgba(hex,alpha)}"></div></div><span class="al">${alias}</span>${alpha<1?`<span class="pct">${Math.round(alpha*100)}%</span>`:''}</div>`;}
function vicon(){return`<div class="t-icon"></div>`;}
const vrows=document.getElementById('vrows'),glist=document.getElementById('glist');
function buildVRows(key){
  vrows.innerHTML='';
  const tr=key==='all'?Object.keys(VG):VSIDEBAR.find(s=>s.k===key)?.groups||[];
  tr.forEach(gname=>{
    const tokens=VG[gname];if(!tokens)return;
    const isSub=gname.includes('/');
    const lbl=document.createElement('div');lbl.className=isSub?'s-lbl':'g-lbl';lbl.textContent=isSub?gname.split('/').pop():gname;vrows.appendChild(lbl);
    tokens.forEach(([name,lH,lA,lAl,dH,dA,dAl])=>{const row=document.createElement('div');row.className='t-row';row.innerHTML=`<div class="tc">${vicon()}<span class="t-name">${name}</span></div><div class="tc">${vpill(lH,lA,lAl)}</div><div class="tc">${vpill(dH,dA,dAl)}</div>`;vrows.appendChild(row);});
  });
}
function buildVSidebar(){
  const allEl=document.createElement('div');allEl.className='a-item on';allEl.dataset.k='all';allEl.innerHTML=`<span>All</span><span class="n">${VTOTAL}</span>`;glist.appendChild(allEl);
  VSIDEBAR.forEach(({k,groups})=>{const cnt=groups.reduce((a,g)=>a+(VG[g]?.length||0),0);const el=document.createElement('div');el.className='g-item';el.dataset.k=k;el.innerHTML=`<span>${k}</span><span class="n">${cnt}</span>`;glist.appendChild(el);});
  glist.addEventListener('click',e=>{const el=e.target.closest('[data-k]');if(!el)return;[...glist.children].forEach(c=>c.classList.toggle('on',c===el));buildVRows(el.dataset.k);});
}
buildVSidebar();buildVRows('all');

const CATS={primary:'cat-primary',label:'cat-label',fill:'cat-fill',line:'cat-line',interaction:'cat-interaction',status:'cat-status',accent:'cat-accent',static:'cat-static',scorecard:'cat-scorecard',bg:'cat-bg'};
const GRPS=[...new Set(MD.map(d=>d[0]))];

let mActiveCat='all';
const mtb=document.getElementById('mtb');
const mfbar=document.getElementById('mfbar');

function msw(hex){
  const isAlpha=hex.startsWith('rgba');
  if(isAlpha){const c=hex.match(/[\d.]+/g);return`<div class="ms"><div class="ms-c"></div><div class="ms-v" style="background:${hex}"></div></div>`;}
  const isW=hex.toUpperCase()==='#FFFFFF';
  return`<div class="ms"${isW?' style="border:.5px solid #555"':''}><div class="ms-v" style="background:${hex}"></div></div>`;
}

MD.forEach(([og,ot,nt,cat,isNew,lH,dH])=>{
  const tr=document.createElement('tr');
  tr.dataset.og=og;tr.dataset.cat=cat;tr.dataset.q=(og+'/'+ot+'/'+nt).toLowerCase();
  tr.innerHTML=`
    <td><span class="og">${og}</span><span class="ot">${ot}${isNew?'<span class="new-b">신규</span>':''}</span></td>
    <td><div class="m-sw">${msw(lH)}<span style="font-family:monospace;font-size:10px;color:#666;margin-left:3px">${lH}</span></div></td>
    <td><div class="m-sw">${msw(dH)}<span style="font-family:monospace;font-size:10px;color:#666;margin-left:3px">${dH}</span></div></td>
    <td class="arr">→</td>
    <td><span class="nt">${nt}</span><br><span class="cat-b ${CATS[cat]}">${cat}</span></td>
    <td>${msw(lH)}</td>
    <td>${msw(dH)}</td>
  `;
  mtb.appendChild(tr);
});

// 필터 버튼
const allMfb=document.createElement('button');allMfb.className='mfb on';allMfb.textContent=`전체 (${MD.length})`;allMfb.dataset.c='all';mfbar.appendChild(allMfb);
Object.keys(CATS).forEach(c=>{const cnt=MD.filter(d=>d[3]===c).length;if(!cnt)return;const b=document.createElement('button');b.className='mfb';b.textContent=`${c} (${cnt})`;b.dataset.c=c;mfbar.appendChild(b);});
mfbar.addEventListener('click',e=>{const b=e.target.closest('.mfb');if(!b)return;mActiveCat=b.dataset.c;[...mfbar.children].forEach(x=>x.classList.toggle('on',x===b));mgo();});

function mgo(){
  const q=document.getElementById('mq').value.toLowerCase().trim();
  let n=0;
  [...mtb.children].forEach(tr=>{
    const v=(mActiveCat==='all'||tr.dataset.cat===mActiveCat)&&(!q||tr.dataset.q.includes(q));
    tr.classList.toggle('hidden',!v);if(v)n++;
  });
  document.getElementById('mstat').innerHTML=`<b>${n}</b>개 표시`;
}
mgo();

/* ===== 탭 전환 ===== */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  const id=t.dataset.t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  document.getElementById('vars-panel').classList.toggle('on',id==='vars');
  document.getElementById('map-panel').classList.toggle('on',id==='map');
}));
</script>
